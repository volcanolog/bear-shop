<!--
  =====================================================================
  content/home.html — фрагмент «Главной» страницы App Shell.
  Практика №17 (расширение практики 13–16): добавлена форма напоминания.
  =====================================================================

  Это НЕ полноценный HTML-документ, а ФРАГМЕНТ разметки.
  В нём нет <html>, <head>, <body> — только то, что подставится
  внутрь <main id="app-content"> в index.html (через innerHTML).

  Что нового по сравнению с практикой 15:
    - Добавлена ВТОРАЯ форма #reminder-form: текст + <input type="datetime-local">.
      Эта форма отправляет на сервер событие `newReminder` (через WebSocket),
      а сервер планирует push-уведомление на указанное время через setTimeout.
    - Список заметок теперь подсвечивает те, что имеют поле `reminder`
      (timestamp в миллисекундах).
-->

<div class="home-content">
    <h2 style="text-align: center;">Добавить заметку</h2>

    <!--
      Обычная форма заметки. Тип `submit` отправляет форму, JS
      перехватывает submit и вызывает addNote(text) без напоминания.
    -->
    <form id="note-form" class="row" autocomplete="off">
        <input
            class="col-9"
            type="text"
            id="note-input"
            placeholder="Введите текст заметки"
            required
        >
        <button class="col-3 button primary" type="submit">Добавить</button>
    </form>

    <!--
      ===== Практика 17: форма заметки С НАПОМИНАНИЕМ =====
      Поле <input type="datetime-local"> — нативный браузерный пикер
      даты и времени. Значение приходит как строка вида '2026-05-10T17:30',
      без часового пояса (то есть в местном времени пользователя).

      В app.js мы переводим её в timestamp через `new Date(value).getTime()`
      и отправляем на сервер. Сервер ставит setTimeout на (reminderTime - Date.now()).

      style="margin-top: 1rem;" — небольшой отступ, чтобы две формы не слипались.
    -->
    <form id="reminder-form" class="row" autocomplete="off" style="margin-top: 1rem;">
        <input
            class="col-5"
            type="text"
            id="reminder-text"
            placeholder="Текст напоминания"
            required
        >
        <input
            class="col-4"
            type="datetime-local"
            id="reminder-time"
            required
        >
        <button class="col-3 button success" type="submit">+ Напоминание</button>
    </form>

    <h2 style="text-align: center; margin-top: 2rem;">Список заметок</h2>

    <!-- В этом UL initNotes() рисует заметки, подсвечивая записи с reminder. -->
    <ul id="notes-list" style="list-style: none; padding-left: 0;"></ul>

    <p class="text-light" style="margin-top: 2rem; font-size: 0.85rem;">
        Заметки хранятся в <code>localStorage</code>. Напоминания планируются
        на сервере через <code>setTimeout</code>. По push-уведомлению можно
        нажать «Отложить на 5 минут» — сервер перенесёт напоминание.
    </p>
</div>
